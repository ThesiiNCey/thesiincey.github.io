<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>

    <link rel="stylesheet" href="assets/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;500;600&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="grid-bg"></div>

<div class="top-icons">

    <a href="https://social.mochiart.moe/@aimiko">
        <i class="fa-brands fa-mastodon"></i>
    </a>

    <a href="https://matrix.to/#/@aimiko:mochiart.moe">
        <img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/matrix-light.webp" alt="Matrix">
    </a>

    <a href="https://discord.com/users/1390020233233694763">
        <i class="fa-brands fa-discord"></i>
    </a>

    <a href="mailto:support@mochiart.moe">
        <i class="fa-solid fa-envelope"></i>
    </a>

</div>

<main class="card">

    <div class="left-side">
        <div class="avatar-ring">
            <img src="aimiko-pfp.jpg">
        </div>
    </div>

    <div class="right-side">

        <h1>AIMIKO</h1>

        <!-- TERMINAL -->
        <div class="terminal">

            <div class="terminal-bar">
                <span></span><span></span><span></span>
                <div class="terminal-title">bash — user@aimiko</div>
            </div>

            <div class="terminal-content">
                <p><span class="prompt">user@aimiko:~$</span> whoami</p>

                <pre class="typed">
Hey, I am Aimiko.
I am a technic freak.
I host some services you can join and explore.
I build systems, break systems, and rebuild them better.
Always online. Always experimenting.
                </pre>
            </div>

        </div>

        <!-- BUTTONS -->
        <div class="actions">

            <a href="https://mochiart.moe" class="btn" target="_blank" rel="noopener">
                Mochiart.moe
            </a>

            <a href="https://discord.gg/b6D6ENh5ZW" class="btn" target="_blank" rel="noopener">
                Discord Server
            </a>

            <a href="#" class="btn">
                Services Status
            </a>

        </div>

    </div>

</main>

</body>
</html>
